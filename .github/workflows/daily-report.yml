name: Daily Peppol Report

# Daily run + publication on https://sandjab.github.io/peppol
#
# 07:00 UTC = 09:00 Europe/Paris (CEST, summer). En heure d'hiver (CET),
# ce sera 08:00 Paris — ajuster manuellement si la précision compte.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write     # commit peppol_history.json
  pages: write        # deploy-pages
  id-token: write     # deploy-pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python dependencies
        run: pip install requests jinja2

      - name: Generate report (HTML brief only)
        run: |
          python generate_peppol_report.py \
            --no-pdf \
            --history peppol_history.json \
            --output-dir ./site

      - name: Stage site for Pages
        run: |
          cp ./site/peppol_extension_report.html ./site/index.html
          ls -la ./site

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- peppol_history.json; then
            echo "No history change to commit."
          else
            git add peppol_history.json
            git commit -m "chore(history): daily run $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
