name: Daily Peppol Report

# Daily run + publication on https://sandjab.github.io/peppol
#
# 05:17 UTC = 07:17 Europe/Paris (CEST, été). En heure d'hiver (CET, UTC+1)
# ce sera 06:17 Paris — ajuster manuellement si la précision compte.
#
# Décalé volontairement de l'heure pile (:00) : GitHub Actions documente
# que les schedules à l'heure pile sont les plus susceptibles d'être
# retardés ou skippés pendant les pics de charge.
on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write     # commit peppol_history.json
  pages: write        # deploy-pages
  id-token: write     # deploy-pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python dependencies
        run: pip install requests jinja2

      - name: Generate report (HTML brief only)
        run: |
          python generate_peppol_report.py \
            --no-pdf \
            --history peppol_history.json \
            --output-dir ./site

      - name: Stage site for Pages
        run: |
          cp ./site/peppol_extension_report.html ./site/index.html
          ls -la ./site

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- peppol_history.json; then
            echo "No history change to commit."
          else
            git add peppol_history.json
            git commit -m "chore(history): daily run $(date -u +%Y-%m-%d)"
            # La branche locale peut avoir pris du retard entre le checkout et le
            # push (commit concurrent sur main → push rejeté « fetch first »).
            # On rebase sur l'état distant puis on réessaie avec backoff.
            branch="${{ github.ref_name }}"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:"$branch"; then
                echo "Push OK (tentative $attempt)."
                exit 0
              fi
              echo "Push rejeté (tentative $attempt) — rebase sur origin/$branch…"
              git pull --rebase origin "$branch"
              sleep $((attempt * 2))
            done
            echo "::error::Échec du push après 5 tentatives."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Daily Peppol Report failed — $(date -u +%Y-%m-%d)" \
            --body "Le workflow quotidien a échoué. Logs : $RUN_URL"
